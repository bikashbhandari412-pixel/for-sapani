<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>For Sapani 🕊️</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #matrix-canvas { z-index: 1; opacity: 0.6; }
        #particle-canvas { z-index: 2; pointer-events: none; }
        
        #loading-screen {
            position: fixed; inset: 0; background: black; z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; transition: opacity 1.5s; text-align: center; padding: 20px;
        }

        .choice-btn {
            padding: 16px 30px; border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1); color: white; cursor: pointer;
            border-radius: 50px; font-size: 18px; margin-top: 20px; transition: 0.3s;
            -webkit-tap-highlight-color: transparent;
        }
        
        #run-away-btn { position: relative; transition: all 0.15s ease-out; }
        .choice-btn:active { background: #ff1a1a; transform: scale(0.95); }

        .sticker { 
            position: fixed; width: 50px; height: 50px; z-index: 500; opacity: 0; 
            pointer-events: none; transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.8s; 
        }

        #photo-reveal {
            position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.92); z-index: 4000; opacity: 0; transition: opacity 2s;
        }
        #photo-reveal img { max-width: 90%; max-height: 70%; border: 3px solid rgba(255,255,255,0.8); border-radius: 12px; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h2 style="font-weight: 400; font-size: 24px; margin-bottom: 5px;">अझै रिसाकी छौ ?</h2>
        <p style="opacity: 0.7; font-size: 14px;">(Are you still angry with me?)</p>
        <div style="display: flex; flex-direction: column; width: 80%; max-width: 300px;">
            <button class="choice-btn" onclick="startExperience()">No...</button>
            <button id="run-away-btn" class="choice-btn" onmouseover="moveButton()" ontouchstart="moveButton(event)">A little</button>
        </div>
    </div>

    <div id="photo-reveal"><img src="Apology.jpg"></div>

    <canvas id="matrix-canvas"></canvas>
    <canvas id="particle-canvas"></canvas>
    
    <audio id="bgMusic" loop><source src="sorry.mp3" type="audio/mpeg"></audio>

    <script>
        const mCanvas = document.getElementById('matrix-canvas');
        const pCanvas = document.getElementById('particle-canvas');
        const mCtx = mCanvas.getContext('2d');
        const pCtx = pCanvas.getContext('2d', { willReadFrequently: true });
        const bgMusic = document.getElementById('bgMusic');

        const sequence = ["I AM", "REALLY", "SORRY", "SAPANI", "❤"];
        const stickerFiles = ["Rose.svg", "beg.svg", "bouquet.svg", "heart.svg"];
        const rainRose = new Image(); rainRose.src = 'Rose.svg';
        const rainHeart = new Image(); rainHeart.src = 'heart.svg';

        let seqIndex = 0;
        let particles = [];
        const POOL_SIZE = window.innerWidth < 600 ? 5000 : 8500;
        let drops;

        function moveButton(e) {
            if(e) e.preventDefault();
            const btn = document.getElementById('run-away-btn');
            const x = Math.random() * (window.innerWidth - btn.offsetWidth - 40);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight - 40);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function resize() {
            mCanvas.width = pCanvas.width = window.innerWidth;
            mCanvas.height = pCanvas.height = window.innerHeight;
            drops = Array(Math.floor(mCanvas.width / 22)).fill(1);
        }
        window.onresize = resize;
        resize();

        function drawMatrix() {
            mCtx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);
            drops.forEach((y, i) => {
                const img = (i % 2 === 0) ? rainRose : rainHeart;
                if (img.complete) {
                    mCtx.globalAlpha = 0.5;
                    mCtx.drawImage(img, i * 22, y * 22, 16, 16);
                    mCtx.globalAlpha = 1.0;
                }
                if (y * 22 > mCanvas.height && Math.random() > 0.985) drops[i] = 0;
                drops[i] += 0.35;
            });
        }

        class Particle {
            constructor() {
                this.x = Math.random() * pCanvas.width;
                this.y = Math.random() * pCanvas.height;
                this.destX = this.x; this.destY = this.y;
                this.vx = 0; this.vy = 0;
                this.opacity = 0; this.active = false;
            }
            update() {
                if (this.active) {
                    this.vx += (this.destX - this.x) * 0.09;
                    this.vy += (this.destY - this.y) * 0.09;
                    if (this.opacity < 1) this.opacity += 0.08;
                } else if (this.opacity > 0) { 
                    this.opacity -= 0.04; 
                    this.vy -= 0.2;
                }
                this.vx *= 0.85; this.vy *= 0.85;
                this.x += this.vx; this.y += this.vy;
            }
            draw() {
                if (this.opacity <= 0) return;
                pCtx.globalAlpha = this.opacity;
                pCtx.fillStyle = '#ff1a1a';
                pCtx.beginPath(); pCtx.arc(this.x, this.y, window.innerWidth < 600 ? 2.2 : 2.8, 0, Math.PI * 2); pCtx.fill();
            }
        }

        for(let i=0; i<POOL_SIZE; i++) particles.push(new Particle());

        function scatterStickers() {
            const count = window.innerWidth < 600 ? 15 : 25;
            for (let i = 0; i < count; i++) {
                setTimeout(() => {
                    const img = document.createElement('img');
                    img.src = stickerFiles[Math.floor(Math.random() * stickerFiles.length)];
                    img.className = 'sticker';
                    img.style.left = '50%'; img.style.top = '50%';
                    document.body.appendChild(img);
                    requestAnimationFrame(() => {
                        const moveX = (Math.random() - 0.5) * window.innerWidth * 0.9;
                        const moveY = (Math.random() - 0.5) * window.innerHeight * 0.9;
                        img.style.opacity = '1';
                        img.style.transform = `translate(${moveX}px, ${moveY}px) rotate(${(Math.random()-0.5)*720}deg) scale(${window.innerWidth < 600 ? 0.7 : 1})`;
                    });
                    setTimeout(() => {
                        img.style.opacity = '0';
                        setTimeout(() => img.remove(), 1000);
                    }, 2000);
                }, i * 100);
            }
        }

        function setWord(text) {
            pCtx.clearRect(0,0,pCanvas.width, pCanvas.height);
            let size = text === "❤" ? (window.innerWidth < 600 ? 280 : 400) : (window.innerWidth < 600 ? 120 : 220);
            pCtx.font = `bold ${size}px Arial`;
            pCtx.textAlign = 'center'; pCtx.textBaseline = 'middle';
            pCtx.fillText(text, pCanvas.width/2, pCanvas.height/2);
            const data = pCtx.getImageData(0,0,pCanvas.width, pCanvas.height).data;
            const coords = [];
            const step = window.innerWidth < 600 ? 8 : 6;
            for(let y=0; y<pCanvas.height; y += step) {
                for(let x=0; x<pCanvas.width; x += step) {
                    if(data[(y*pCanvas.width+x)*4+3] > 128) coords.push({x,y});
                }
            }
            particles.forEach(p => p.active = false);
            for(let i=0; i<coords.length && i<particles.length; i++) {
                particles[i].destX = coords[i].x; particles[i].destY = coords[i].y;
                particles[i].active = true;
            }
        }

        function cycle() {
            setWord(sequence[seqIndex]);
            if (sequence[seqIndex] === "❤") scatterStickers();
            if (seqIndex === sequence.length - 1) {
                setTimeout(() => { 
                    const pr = document.getElementById('photo-reveal');
                    pr.style.display = 'flex'; 
                    setTimeout(() => pr.style.opacity = '1', 100);
                }, 4500);
                return;
            }
            seqIndex++;
            setTimeout(cycle, 3800);
        }

        function startExperience() {
            bgMusic.play().catch(() => {});
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-screen').remove();
                setInterval(drawMatrix, 50);
                function pLoop() { 
                    pCtx.clearRect(0,0,pCanvas.width,pCanvas.height); 
                    particles.forEach(p=> {p.update(); p.draw();}); 
                    requestAnimationFrame(pLoop); 
                }
                pLoop(); cycle();
            }, 1000);
        }
    </script>
</body>
</html>
