<!-- Add this section to your existing CSS styles -->
<style>
    /* Styling for the floating SVGs (stickers) */
    .sticker {
        position: fixed;
        width: 50px;
        height: 50px;
        pointer-events: none;
        z-index: 500;
        opacity: 0;
        transition: transform 0.5s ease-out, opacity 0.5s;
    }

    /* Final Photo Reveal Styling */
    #photo-reveal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.8);
        z-index: 4000;
        animation: fadeIn 2s forwards;
    }

    #photo-reveal img {
        max-width: 80%;
        max-height: 80%;
        border: 5px solid white;
        box-shadow: 0 0 30px rgba(255, 26, 26, 0.5);
        border-radius: 10px;
    }
</style>

<!-- Add this reveal container to your body -->
<div id="photo-reveal">
    <img src="Apology.jpg" alt="Thinking of you">
</div>

<!-- Updated JavaScript Logic -->
<script>
    const stickers = ["Rose.svg", "beg.svg", "bouquet.svg", "heart.svg"];

    function spawnStickers() {
        for (let i = 0; i < 12; i++) {
            setTimeout(() => {
                const img = document.createElement('img');
                img.src = stickers[Math.floor(Math.random() * stickers.length)];
                img.className = 'sticker';
                
                // Random position and movement
                const x = window.innerWidth / 2;
                const y = window.innerHeight / 2;
                const tx = (Math.random() - 0.5) * 400;
                const ty = (Math.random() - 0.5) * 400;

                img.style.left = x + 'px';
                img.style.top = y + 'px';
                document.body.appendChild(img);

                // Trigger animation
                requestAnimationFrame(() => {
                    img.style.opacity = '1';
                    img.style.transform = `translate(${tx}px, ${ty}px) rotate(${tx}deg)`;
                });

                // Cleanup
                setTimeout(() => img.remove(), 3000);
            }, i * 150);
        }
    }

    // Update your existing cycle function to trigger the reveal

        // If the current word is the heart, spawn stickers
        if (sequence[seqIndex] === "❤") {
            setTimeout(spawnStickers, 500);
            
            // After the final heart, show the Apology photo
            if (seqIndex === sequence.length - 1) {
                setTimeout(() => {
                    document.getElementById('photo-reveal').style.display = 'flex';
                }, 4000);
            }
        }

        seqIndex = (seqIndex + 1) % sequence.length;
        // Keep cycling unless the photo reveal is showing
        if (document.getElementById('photo-reveal').style.display !== 'flex') {
            setTimeout(cycle, 3500);
        }
    }
</script>
