<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For Sapani 🕊️</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #matrix-canvas { z-index: 1; opacity: 0.45; }
        #particle-canvas { z-index: 2; pointer-events: none; }
        
        #loading-screen {
            position: fixed; inset: 0; background: black; z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; transition: opacity 1.5s; text-align: center; padding: 20px;
        }

        .choice-btn {
            padding: 12px 35px; border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1); color: white; cursor: pointer;
            border-radius: 30px; font-size: 16px; margin-top: 20px; transition: 0.3s;
        }
        .choice-btn:hover { background: #ff1a1a; box-shadow: 0 0 25px #ff1a1a; }

        .sticker { position: fixed; width: 60px; height: 60px; z-index: 500; opacity: 0; transition: transform 0.8s ease-out, opacity 0.8s; }

        #photo-reveal {
            position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9); z-index: 4000; opacity: 0; transition: opacity 2s;
        }
        #photo-reveal img { max-width: 85%; max-height: 80%; border: 4px solid white; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h2 style="font-weight: 300;">अझै रिसाकी छौ ?</h2>
        <p style="opacity: 0.7;">(Are you still angry with me?)</p>
        <button class="choice-btn" onclick="startExperience()">No...</button>
    </div>

    <div id="photo-reveal"><img src="Apology.jpg"></div>

    <canvas id="matrix-canvas"></canvas>
    <canvas id="particle-canvas"></canvas>
    
    <audio id="bgMusic" loop><source src="sorry.mp3" type="audio/mpeg"></audio>

    <script>
        const mCanvas = document.getElementById('matrix-canvas');
        const pCanvas = document.getElementById('particle-canvas');
        const mCtx = mCanvas.getContext('2d');
        const pCtx = pCanvas.getContext('2d', { willReadFrequently: true });
        const bgMusic = document.getElementById('bgMusic');

        const themeColor = '#ff1a1a';
        const sequence = ["I AM", "REALLY", "SORRY", "SAPANI", "❤"];
        const stickers = ["Rose.svg", "beg.svg", "bouquet.svg", "heart.svg"];
        let seqIndex = 0;
        let particles = [];
        const POOL_SIZE = 8000;
        let drops;

        function resize() {
            mCanvas.width = pCanvas.width = window.innerWidth;
            mCanvas.height = pCanvas.height = window.innerHeight;
            drops = Array(Math.floor(mCanvas.width / 12)).fill(1);
        }
        window.onresize = resize;
        resize();

        function drawMatrix() {
            mCtx.fillStyle = 'rgba(0, 0, 0, 0.12)';
            mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);
            mCtx.font = '14px monospace';
            drops.forEach((y, i) => {
                const char = "SORRYSAPANI"[Math.floor(Math.random() * 11)];
                mCtx.fillStyle = themeColor;
                mCtx.fillText(char, i * 12, y * 12);
                if (y * 12 > mCanvas.height && Math.random() > 0.985) drops[i] = 0;
                drops[i] += 0.4;
            });
        }

        class Particle {
            constructor() {
                this.x = Math.random() * pCanvas.width;
                this.y = Math.random() * pCanvas.height;
                this.destX = this.x; this.destY = this.y;
                this.vx = 0; this.vy = 0;
                this.opacity = 0; this.active = false;
            }
            update() {
                if (this.active) {
                    this.vx += (this.destX - this.x) * 0.08;
                    this.vy += (this.destY - this.y) * 0.08;
                    if (this.opacity < 1) this.opacity += 0.05;
                } else {
                    if (this.opacity > 0) { this.opacity -= 0.05; this.vy -= 0.1; }
                }
                this.vx *= 0.88; this.vy *= 0.88;
                this.x += this.vx; this.y += this.vy;
            }
            draw() {
                if (this.opacity <= 0) return;
                pCtx.globalAlpha = this.opacity;
                pCtx.fillStyle = themeColor;
                pCtx.beginPath(); pCtx.arc(this.x, this.y, 2.5, 0, Math.PI * 2); pCtx.fill();
            }
        }

        for(let i=0; i<POOL_SIZE; i++) particles.push(new Particle());

        function spawnStickers() {
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    const img = document.createElement('img');
                    img.src = stickers[Math.floor(Math.random() * stickers.length)];
                    img.className = 'sticker';
                    img.style.left = '50%'; img.style.top = '50%';
                    document.body.appendChild(img);
                    requestAnimationFrame(() => {
                        img.style.opacity = '1';
                        img.style.transform = `translate(${(Math.random()-0.5)*400}px, ${(Math.random()-0.5)*400}px) rotate(${(Math.random()-0.5)*90}deg)`;
                    });
                    setTimeout(() => img.remove(), 2500);
                }, i * 200);
            }
        }

        function setWord(text) {
            pCtx.clearRect(0,0,pCanvas.width, pCanvas.height);
            let size = text === "❤" ? 350 : 220;
            pCtx.font = `bold ${Math.min(pCanvas.width/5, size)}px Arial`;
            pCtx.textAlign = 'center'; pCtx.textBaseline = 'middle';
            pCtx.fillText(text, pCanvas.width/2, pCanvas.height/2);
            const data = pCtx.getImageData(0,0,pCanvas.width, pCanvas.height).data;
            const coords = [];
            for(let y=0; y<pCanvas.height; y += 6) {
                for(let x=0; x<pCanvas.width; x += 6) {
                    if(data[(y*pCanvas.width+x)*4+3] > 128) coords.push({x,y});
                }
            }
            particles.forEach(p => p.active = false);
            for(let i=0; i<coords.length && i<particles.length; i++) {
                particles[i].destX = coords[i].x; particles[i].destY = coords[i].y;
                particles[i].active = true;
            }
        }

        function cycle() {
            setWord(sequence[seqIndex]);
            if (sequence[seqIndex] === "❤") spawnStickers();
            if (seqIndex === sequence.length - 1) {
                setTimeout(() => { 
                    const pr = document.getElementById('photo-reveal');
                    pr.style.display = 'flex'; setTimeout(() => pr.style.opacity = '1', 100);
                }, 4000);
                return;
            }
            seqIndex++;
            setTimeout(cycle, 3500);
        }

        function startExperience() {
            bgMusic.play();
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-screen').remove();
                setInterval(drawMatrix, 50);
                function pLoop() { pCtx.clearRect(0,0,pCanvas.width,pCanvas.height); particles.forEach(p=> {p.update(); p.draw();}); requestAnimationFrame(pLoop); }
                pLoop(); cycle();
            }, 1500);
        }
    </script>
</body>
</html>
